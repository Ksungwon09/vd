version: '3.7'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vd_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./downloads:/code/downloads
      - ./data:/code/data
    # 포트를 외부에 노출하지 않음 — Caddy가 내부 네트워크로 접근
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vd_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
